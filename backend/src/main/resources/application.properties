# ===== SERVER =====
server.port=8080

# ===== DATABASE (sesuaikan dengan MySQL kamu) =====
spring.datasource.url=jdbc:mysql://localhost:3306/pegi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Konfigurasi Email Pengirim (Gunakan Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email_tim_kalian@gmail.com
# Gunakan "App Password" dari Google, BUKAN password email asli
spring.mail.password=masukkan_app_password_disini
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Ganti secret ini dengan string random panjang (minimal 32 karakter)
jwt.secret=pegi-super-secret-key-2024-kelompok-1-uin-sgd
# Token berlaku 24 jam (dalam milidetik)
jwt.expiration=86400000
