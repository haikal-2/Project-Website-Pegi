spring.application.name=PegiGo
#nama database nya pegi_db kalo mau test create tabel aja di phpmyadmin : pegi_db
spring.datasource.url=jdbc:mysql://localhost:3306/pegi_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfigurasi JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Konfigurasi Email Pengirim (Gunakan Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email_tim_kalian@gmail.com
# Gunakan "App Password" dari Google, BUKAN password email asli
spring.mail.password=masukkan_app_password_disini
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true